<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nachschlagewerk</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Klassik & Oper">
<style>
:root{--bg:#f7f6f2;--panel:#fff;--ink:#1c1b18;--muted:#6b6862;--line:#e7e4dc;
  --brand:#3b6e58;--brandink:#fff;--soft:#eef0ee;--gold:#c79a2b;
  --shadow:0 8px 24px rgba(40,30,20,.07);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.55;-webkit-text-size-adjust:100%}
header{position:sticky;top:0;z-index:10;background:rgba(247,246,242,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hd{max-width:920px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:20px;
  background:linear-gradient(150deg,var(--brand),#0000),var(--brand);color:#fff;box-shadow:var(--shadow)}
.ttl b{font-size:17px;font-weight:800}
.ttl span{display:block;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.tabs button{font:inherit;font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:1px solid transparent;border-radius:999px;padding:7px 14px;cursor:pointer}
.tabs button.active{color:var(--brandink);background:var(--brand)}
main{max-width:920px;margin:0 auto;padding:18px 16px 70px}
.view{display:none}.view.active{display:block}
.search{width:100%;font:inherit;font-size:15px;color:var(--ink);background:var(--panel);border:1.5px solid var(--line);border-radius:12px;padding:12px 15px;margin-bottom:14px}
.search:focus{outline:none;border-color:var(--brand)}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.chip{font:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer}
.chip.active{color:var(--brandink);background:var(--brand);border-color:transparent}
.catblock{margin-bottom:26px}
.catblock h2{font-size:20px;margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid var(--line)}
.catblock h2 .ic{margin-right:6px}
.article{background:var(--soft);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:13px;padding:14px 18px;margin-bottom:14px;font-size:14.5px;color:#33312c}
.article p{margin:0 0 9px}.article p:last-child{margin:0}.article b{color:var(--ink)}
.factlabel{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:4px 0 8px}
.entry{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.entry .q{font-weight:700;font-size:15px}
.entry .ans{margin-top:4px;font-size:14px}
.entry .ans b2{}
.entry .ans .lab{color:var(--brand);font-weight:700}
.entry .fb{margin-top:6px;font-size:14px;color:#3a3833}
.entry .fb b{color:var(--ink)}
.count{color:var(--muted);font-size:13px;margin-bottom:14px}
.src{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
.src b{font-size:15px}
.src p{margin:3px 0 0;color:var(--muted);font-size:14px}
.lead{color:var(--muted);max-width:640px;margin:0 0 16px}
.iframe-wrap{border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:var(--shadow);background:var(--panel)}
.iframe-wrap iframe{width:100%;height:78vh;border:0;display:block}
.empty{color:var(--muted);padding:30px 0;text-align:center}
footer{max-width:920px;margin:0 auto;padding:0 16px 40px;color:var(--muted);font-size:12px;text-align:center}
@media(max-width:560px){.hd{padding:10px 12px}.tabs{margin-left:0;width:100%}main{padding:14px 12px 60px}}
</style>
</head>
<body>
<header>
  <div class="hd">
    <div class="logo" id="logo"></div>
    <div class="ttl"><b id="brand"></b><span>Nachschlagewerk</span></div>
    <div class="tabs" id="tabs"></div>
  </div>
</header>
<main>
  <section class="view active" id="v-look">
    <input class="search" id="search" placeholder="Suchen … (Begriff, Antwort, Stichwort)">
    <div class="chips" id="chips"></div>
    <div class="count" id="count"></div>
    <div id="list"></div>
  </section>
  <section class="view" id="v-aroma">
    <p class="lead">Das interaktive Aromarad – klick dich durch Kategorien und Aromen.</p>
    <div class="iframe-wrap"><iframe src="aromarad.html" title="Aromarad" loading="lazy"></iframe></div>
  </section>
  <section class="view" id="v-src">
    <p class="lead">Wo findest du mehr? Empfehlenswerte, verlässliche Quellen zum Vertiefen.</p>
    <div id="srclist"></div>
  </section>
</main>
<footer id="foot"></footer>
<script>
const APP={"title": "Klassik & Oper", "brand": "Klas<b>sik</b>", "color": "#3f3a78", "ic": "🎼", "aroma": false, "order": ["Epochen & Stil", "Orchester & Instrumente", "Interpretation & Hören", "Oper: Die Musik", "Oper: Grundwissen", "Orchester & Dirigenten der Welt", "Glossar"], "icons": {"Epochen & Stil": "🏛️", "Orchester & Instrumente": "🎻", "Interpretation & Hören": "⭐", "Oper: Die Musik": "🎶", "Oper: Grundwissen": "🎭", "Orchester & Dirigenten der Welt": "🌍", "Glossar": "📖"}, "entries": [{"cat": "Epochen & Stil", "q": "Welche Epoche kommt direkt vor der Romantik?", "ans": "Wiener Klassik", "fb": "Barock → Klassik → Romantik → Moderne. Vor der Romantik liegt die Wiener Klassik."}, {"cat": "Epochen & Stil", "q": "Woran erkennt man typischerweise Barockmusik?", "ans": "Mehrere verwobene Stimmen &amp; Generalbass", "fb": "Polyphonie, durchlaufender Generalbass und Terrassendynamik sind Barock-Kennzeichen."}, {"cat": "Epochen & Stil", "q": "Was beschreibt die Sonatensatzform?", "ans": "Exposition – Durchführung – Reprise", "fb": "Die klassische Form: Themen werden vorgestellt, verarbeitet und kehren wieder."}, {"cat": "Epochen & Stil", "q": "Welcher Komponist gehört NICHT zur Wiener Klassik?", "ans": "Debussy", "fb": "Debussy ist ein Komponist der Moderne (Impressionismus)."}, {"cat": "Orchester & Instrumente", "q": "Welche Gruppe sitzt im Orchester ganz vorn?", "ans": "Streicher", "fb": "Die leisen, zahlreichen Streicher sitzen vorn; lautes Blech/Schlagwerk hinten."}, {"cat": "Orchester & Instrumente", "q": "Welches Instrument gehört zu den Holzbläsern?", "ans": "Oboe", "fb": "Oboe (mit Flöte, Klarinette, Fagott). Trompete/Posaune = Blech, Pauke = Schlagwerk."}, {"cat": "Orchester & Instrumente", "q": "Was macht der Konzertmeister?", "ans": "Stimmt ein &amp; ist Bindeglied zum Dirigenten", "fb": "Der/die erste Geiger(in) stimmt das Orchester ein und spielt Violin-Soli."}, {"cat": "Orchester & Instrumente", "q": "Was bedeutet „Pizzicato\"?", "ans": "Saiten zupfen statt streichen", "fb": "Pizzicato = die Saiten werden gezupft."}, {"cat": "Orchester & Instrumente", "q": "Welches ist ein Blechblasinstrument?", "ans": "Horn", "fb": "Horn, Trompete, Posaune und Tuba bilden das Blech."}, {"cat": "Interpretation & Hören", "q": "Was bedeutet „Rubato\"?", "ans": "Flexibles Dehnen des Tempos", "fb": "Rubato lässt die Musik durch feines Tempo-Spiel „atmen\"."}, {"cat": "Interpretation & Hören", "q": "Was ist KEIN Zeichen einer überzeugenden Interpretation?", "ans": "Durchweg gleich laut", "fb": "„Immer mittellaut\" ist eine Schwäche – gute Deutungen leben von Kontrast."}, {"cat": "Interpretation & Hören", "q": "Was meint „Intonation\"?", "ans": "Sauberkeit der Tonhöhe", "fb": "Intonation = wie sauber die Töne zueinander gestimmt sind."}, {"cat": "Interpretation & Hören", "q": "Wie schult man das Ohr am schnellsten?", "ans": "Zwei Aufnahmen derselben Stelle vergleichen", "fb": "Der direkte Vergleich macht Interpretations-Entscheidungen hörbar."}, {"cat": "Oper: Die Musik", "q": "Wonach werden Sängerstimmen eingeteilt?", "ans": "Nach Lage &amp; Klangfarbe (Stimmfach)", "fb": "Stimmfächer ordnen Stimmen wie Instrumente nach Lage und Timbre."}, {"cat": "Oper: Die Musik", "q": "Was ist ein „Leitmotiv\"?", "ans": "Wiederkehrendes Motiv für Person/Idee", "fb": "Wiederkehrendes musikalisches Motiv, berühmt durch Wagner."}, {"cat": "Oper: Die Musik", "q": "Was bedeutet „Koloratur\"?", "ans": "Schnelle virtuose Verzierungen der Stimme", "fb": "Koloraturen sind virtuose Läufe – glanzvoll v. a. im hohen Sopran."}, {"cat": "Oper: Die Musik", "q": "Welche Rolle spielt das Orchester in der Oper?", "ans": "Mit-Erzähler: trägt Stimmung, Spannung, Farbe", "fb": "Das Orchester kommentiert, treibt und malt – gleichberechtigt mit der Stimme."}, {"cat": "Oper: Die Musik", "q": "Worauf hörst du bei einer Arie vor allem?", "ans": "Auf Gesangslinie, Dynamik &amp; Zusammenspiel mit Orchester", "fb": "Musikalisch zählen Linie, Dynamik und das Stimme-Orchester-Zusammenspiel."}, {"cat": "Oper: Grundwissen", "q": "Was ist eine Ouvertüre?", "ans": "Das instrumentale Vorspiel", "fb": "Die Ouvertüre eröffnet die Oper instrumental."}, {"cat": "Oper: Grundwissen", "q": "Was ist ein Rezitativ?", "ans": "Sprechgesang, der die Handlung trägt", "fb": "Das Rezitativ treibt als Sprechgesang die Handlung voran."}, {"cat": "Oper: Grundwissen", "q": "Was ist ein Libretto?", "ans": "Der Text der Oper", "fb": "Das Libretto ist der Operntext."}, {"cat": "Orchester & Dirigenten der Welt", "q": "Wer ist Chefdirigent der Berliner Philharmoniker?", "ans": "Kirill Petrenko", "fb": "Kirill Petrenko leitet Berlin; Rattle war es früher."}, {"cat": "Orchester & Dirigenten der Welt", "q": "Welches Orchester hat bewusst keinen festen Chefdirigenten?", "ans": "Wiener Philharmoniker", "fb": "Die Wiener Philharmoniker verwalten sich selbst."}, {"cat": "Orchester & Dirigenten der Welt", "q": "Welcher junge Dirigent übernimmt ab 2027 Concertgebouw UND Chicago?", "ans": "Klaus Mäkelä", "fb": "Der Finne Klaus Mäkelä übernimmt beide Weltorchester."}, {"cat": "Orchester & Dirigenten der Welt", "q": "Wofür ist Herbert von Karajan berühmt?", "ans": "Den „Karajan-Sound&quot; der Berliner Philharmoniker", "fb": "Karajan prägte einen makellosen, samtigen Orchesterklang."}, {"cat": "Epochen & Stil", "q": "Woran erkennst du Barockmusik beim Hören?", "ans": "", "fb": "Mehrere gleichberechtigte Stimmen (Polyphonie), durchlaufender Generalbass, Terrassendynamik und oft ein hörbares Cembalo."}, {"cat": "Epochen & Stil", "q": "Was ist typisch für die Wiener Klassik?", "ans": "", "fb": "Klarheit und Balance: Melodie mit Begleitung, ebenmäßige „sprechende\" Phrasen, durchsichtiger Klang, Sonatensatzform."}, {"cat": "Epochen & Stil", "q": "Welche Merkmale hat romantische Musik?", "ans": "", "fb": "Große dynamische Bögen, Rubato, reiche Harmonik, Leitmotive und üppige Orchesterfarben – Gefühl und Erzählung stehen im Vordergrund."}, {"cat": "Epochen & Stil", "q": "Wie klingt die Moderne (20./21. Jh.)?", "ans": "", "fb": "Ungewohnte Klangfarben und Rhythmen, schwebende oder fehlende Tonart, scharfe Kontraste – Regeln werden neu erfunden."}, {"cat": "Epochen & Stil", "q": "Was bedeutet „Terrassendynamik\"?", "ans": "", "fb": "Lautstärke wechselt in Stufen (laut/leise) statt in fließenden Übergängen – typisch für den Barock."}, {"cat": "Epochen & Stil", "q": "Was ist die Sonatensatzform?", "ans": "", "fb": "Das klassische Bauprinzip: Exposition (Themen) – Durchführung (Verarbeitung) – Reprise (Wiederkehr)."}, {"cat": "Epochen & Stil", "q": "Nenne drei zentrale Barock-Komponisten.", "ans": "", "fb": "Johann Sebastian Bach, Georg Friedrich Händel und Antonio Vivaldi."}, {"cat": "Epochen & Stil", "q": "Welche drei Komponisten bilden die „Wiener Klassik\"?", "ans": "", "fb": "Joseph Haydn, Wolfgang Amadeus Mozart und Ludwig van Beethoven."}, {"cat": "Orchester & Instrumente", "q": "Welche vier Gruppen bilden das Sinfonieorchester?", "ans": "", "fb": "Streicher, Holzbläser, Blechbläser und Schlagwerk (oft ergänzt durch Harfe)."}, {"cat": "Orchester & Instrumente", "q": "Welche Instrumente gehören zu den Streichern?", "ans": "", "fb": "Violine (1. & 2.), Bratsche (Viola), Violoncello und Kontrabass."}, {"cat": "Orchester & Instrumente", "q": "Welche Instrumente zählen zu den Holzbläsern?", "ans": "", "fb": "Flöte, Oboe, Klarinette und Fagott."}, {"cat": "Orchester & Instrumente", "q": "Welche Instrumente sind Blechbläser?", "ans": "", "fb": "Horn, Trompete, Posaune und Tuba."}, {"cat": "Orchester & Instrumente", "q": "Warum sitzen die Streicher vorn und das Blech hinten?", "ans": "", "fb": "Die leisen, zahlreichen Streicher bilden das Fundament; lautes Blech und Schlagwerk sitzen hinten/höher, damit die Balance stimmt."}, {"cat": "Orchester & Instrumente", "q": "Was macht der Konzertmeister?", "ans": "", "fb": "Erste(r) Geiger(in): stimmt das Orchester ein, ist Bindeglied zum Dirigenten und spielt wichtige Violin-Soli."}, {"cat": "Orchester & Instrumente", "q": "Welche Rolle haben die Celli im Orchester?", "ans": "", "fb": "Singende Tenor-/Bassstimme – oft die schönsten melodischen Linien und ein warmes Klangfundament."}, {"cat": "Orchester & Instrumente", "q": "Was ist die Aufgabe des Dirigenten?", "ans": "", "fb": "Er gestaltet Tempo, Balance, Dynamik und die große Linie und gibt Einsätze – er formt die Interpretation, ist kein bloßer Taktgeber."}, {"cat": "Orchester & Instrumente", "q": "Was bedeutet „Pizzicato\"?", "ans": "", "fb": "Die Saiten werden mit den Fingern gezupft statt mit dem Bogen gestrichen."}, {"cat": "Orchester & Instrumente", "q": "Wofür sorgt die Pauke im Orchester?", "ans": "", "fb": "Für Rhythmus, Akzente und dramatische Schläge – sie ist oft der „Donner\" des Orchesters."}, {"cat": "Interpretation & Hören", "q": "Was bedeutet „Rubato\"?", "ans": "", "fb": "Das feine, ausdrucksvolle Dehnen und Drängen des Tempos – es lässt die Musik „atmen\"."}, {"cat": "Interpretation & Hören", "q": "Woran erkennst du eine gute Klangbalance?", "ans": "", "fb": "Die Hauptstimme ist klar hörbar, die Begleitung tritt zurück, und die Klangfarben mischen sich zu einem Ganzen."}, {"cat": "Interpretation & Hören", "q": "Was meint „Spannungsbogen\" in der Musik?", "ans": "", "fb": "Spannung wird über lange Strecken aufgebaut und gezielt gelöst – statt durchweg gleich laut zu bleiben."}, {"cat": "Interpretation & Hören", "q": "Was ist „Intonation\"?", "ans": "", "fb": "Die Sauberkeit der Tonhöhe – das genaue Stimmen der Töne zueinander."}, {"cat": "Interpretation & Hören", "q": "Was bedeutet „Phrasierung\"?", "ans": "", "fb": "Das Gliedern und Formen von Melodien in sinnvolle „Sätze\" – mit Betonungen, Bögen und Atempunkten."}, {"cat": "Interpretation & Hören", "q": "Was ist ein Zeichen einer SCHWACHEN Interpretation?", "ans": "", "fb": "Alles bleibt „mittellaut\" ohne echte Kontraste, das Tempo schleppt unmotiviert, Linien gehen im Klangbrei unter."}, {"cat": "Interpretation & Hören", "q": "Wie schult man am schnellsten das Ohr?", "ans": "", "fb": "Dieselbe Stelle in zwei oder drei Aufnahmen direkt hintereinander vergleichen – so hört man, was eine Entscheidung ist."}, {"cat": "Interpretation & Hören", "q": "Was bedeutet „Ensemble\" in Bezug auf Qualität?", "ans": "", "fb": "Wie präzise das Orchester zusammenspielt – Einsätze, Läufe und Pausen wie aus einem Guss, als wäre es ein Instrument."}, {"cat": "Interpretation & Hören", "q": "Was meint eine „Referenzaufnahme\"?", "ans": "", "fb": "Eine Einspielung, die über Jahrzehnte als Maßstab gilt – nicht die einzig „richtige\", aber eine besonders überzeugende."}, {"cat": "Oper: Die Musik", "q": "Wie werden Sängerstimmen eingeteilt?", "ans": "", "fb": "Nach Stimmfächern – nach Lage und Klangfarbe: Sopran, Mezzo/Alt (Frauen) und Tenor, Bariton, Bass (Männer). Die Stimme ist wie ein Instrument."}, {"cat": "Oper: Die Musik", "q": "Was zählt musikalisch bei einer Opernstimme?", "ans": "", "fb": "Wie bei einem Instrument: Intonation, Phrasierung, Dynamik, Atemführung und das Timbre (die Klangfarbe)."}, {"cat": "Oper: Die Musik", "q": "Welche Rolle spielt das Orchester in der Oper?", "ans": "", "fb": "Es trägt Stimmung, Spannung und Farbe, kommentiert und treibt die Handlung – ein gleichberechtigter Mit-Erzähler, nicht bloße Begleitung."}, {"cat": "Oper: Die Musik", "q": "Was ist ein „Leitmotiv\"?", "ans": "", "fb": "Ein wiederkehrendes musikalisches Motiv für eine Person, Idee oder Sache – berühmt durch Richard Wagner."}, {"cat": "Oper: Die Musik", "q": "Was bedeutet „Koloratur\"?", "ans": "", "fb": "Schnelle, virtuose Verzierungen und Läufe der Singstimme – besonders glanzvoll bei hohen Sopranpartien."}, {"cat": "Oper: Die Musik", "q": "Was meint „Belcanto\"?", "ans": "", "fb": "„Schöner Gesang\": ein Stil mit Betonung auf schöner, fließender Gesangslinie und Klangkultur (z. B. Bellini, Donizetti)."}, {"cat": "Oper: Die Musik", "q": "Worauf solltest du beim Hören einer Arie achten?", "ans": "", "fb": "Auf die Gesangslinie und Dynamik der Stimme und darauf, wie das Orchester mit ihr zusammenspielt – nicht primär auf die Bühnenhandlung."}, {"cat": "Oper: Die Musik", "q": "Was ist eine Arie – musikalisch betrachtet?", "ans": "", "fb": "Eine Solo-Nummer, in der die Handlung innehält und die Musik aufblüht: der lyrische, melodische Höhepunkt einer Figur."}, {"cat": "Oper: Die Musik", "q": "Warum gilt das Ensemble (mehrere Stimmen) oft als musikalischer Höhepunkt?", "ans": "", "fb": "Weil mehrere Stimmlinien gleichzeitig kunstvoll verwoben werden – ein klanglich besonders reicher, komplexer Moment."}, {"cat": "Oper: Grundwissen", "q": "Was ist eine Ouvertüre?", "ans": "", "fb": "Das instrumentale Vorspiel einer Oper – stimmt auf Stimmung und musikalische Themen ein."}, {"cat": "Oper: Grundwissen", "q": "Was ist ein Rezitativ?", "ans": "", "fb": "Sprechähnlicher Gesang, der die Handlung vorantreibt (der „Dialog\")."}, {"cat": "Oper: Grundwissen", "q": "Was ist ein Libretto?", "ans": "", "fb": "Der Text einer Oper."}, {"cat": "Oper: Grundwissen", "q": "Was bedeutet „Finale\" in der Oper?", "ans": "", "fb": "Der große Abschluss eines Aktes, in dem die Handlungsfäden – und oft viele Stimmen – zusammenlaufen."}, {"cat": "Oper: Grundwissen", "q": "Nenne zwei gute Einstiegsopern.", "ans": "", "fb": "Mozarts „Zauberflöte\" und Puccinis „La Bohème\" – eingängige Melodien, klare Handlung."}, {"cat": "Orchester & Dirigenten der Welt", "q": "Wer ist Chefdirigent der Berliner Philharmoniker?", "ans": "", "fb": "Kirill Petrenko."}, {"cat": "Orchester & Dirigenten der Welt", "q": "Welches Spitzenorchester hat bewusst keinen festen Chefdirigenten?", "ans": "", "fb": "Die Wiener Philharmoniker – sie verwalten sich selbst und arbeiten mit Gastdirigenten."}, {"cat": "Orchester & Dirigenten der Welt", "q": "Welcher Dirigent übernimmt ab 2027 Concertgebouw und Chicago?", "ans": "", "fb": "Klaus Mäkelä, der gefeierte junge finnische Dirigent."}, {"cat": "Orchester & Dirigenten der Welt", "q": "Wer wurde 2026 Musikdirektor der New Yorker Philharmoniker?", "ans": "", "fb": "Gustavo Dudamel (zuvor lange in Los Angeles)."}, {"cat": "Orchester & Dirigenten der Welt", "q": "Wer leitet seit 2023 das BR-Symphonieorchester München?", "ans": "", "fb": "Sir Simon Rattle."}, {"cat": "Orchester & Dirigenten der Welt", "q": "Wofür ist Herbert von Karajan berühmt?", "ans": "", "fb": "Für den makellosen, samtigen „Karajan-Sound\" der Berliner Philharmoniker und seine prägende Schallplattenkultur."}, {"cat": "Orchester & Dirigenten der Welt", "q": "Warum ist Carlos Kleiber legendär?", "ans": "", "fb": "Er dirigierte sehr selten, doch seine Beethoven-Sinfonien Nr. 5 & 7 zählen zu den meistgerühmten Aufnahmen überhaupt."}, {"cat": "Orchester & Dirigenten der Welt", "q": "Welche US-Orchester nennt man die „Big Five\"?", "ans": "", "fb": "Chicago, Boston, New York, Philadelphia und Cleveland."}, {"cat": "Glossar", "q": "Arie", "ans": "", "fb": "Solo-Gesangsstück; die Handlung hält inne und die Musik blüht auf."}, {"cat": "Glossar", "q": "Belcanto", "ans": "", "fb": "„Schöner Gesang\" – Stil mit Betonung auf fließender, schöner Gesangslinie."}, {"cat": "Glossar", "q": "Cembalo", "ans": "", "fb": "Barockes Tasteninstrument; Saiten werden gezupft statt angeschlagen."}, {"cat": "Glossar", "q": "Crescendo", "ans": "", "fb": "Allmähliches Lauterwerden (Gegenteil: Decrescendo)."}, {"cat": "Glossar", "q": "Dynamik", "ans": "", "fb": "Lautstärkegestaltung von leise (piano) bis laut (forte)."}, {"cat": "Glossar", "q": "Ensemble", "ans": "", "fb": "Mehrere Sänger/Musiker zugleich – oft musikalischer Höhepunkt."}, {"cat": "Glossar", "q": "Fuge", "ans": "", "fb": "Satzform, in der ein Thema von mehreren Stimmen nacheinander aufgegriffen wird."}, {"cat": "Glossar", "q": "Generalbass", "ans": "", "fb": "Barocke Bassbegleitung, über der Akkorde frei ausgefüllt werden."}, {"cat": "Glossar", "q": "Intonation", "ans": "", "fb": "Sauberkeit der Tonhöhe – das Stimmen der Töne zueinander."}, {"cat": "Glossar", "q": "Koloratur", "ans": "", "fb": "Schnelle, virtuose Verzierungen der Singstimme."}, {"cat": "Glossar", "q": "Konzertmeister", "ans": "", "fb": "Erste(r) Geiger(in); Bindeglied zwischen Orchester und Dirigent."}, {"cat": "Glossar", "q": "Leitmotiv", "ans": "", "fb": "Wiederkehrendes Motiv für Person/Idee (v. a. bei Wagner)."}, {"cat": "Glossar", "q": "Libretto", "ans": "", "fb": "Der Text einer Oper."}, {"cat": "Glossar", "q": "Ouvertüre", "ans": "", "fb": "Instrumentale Eröffnung einer Oper oder eines Werks."}, {"cat": "Glossar", "q": "Phrasierung", "ans": "", "fb": "Das Gliedern und Formen von Melodien in sinnvolle „Sätze\"."}, {"cat": "Glossar", "q": "Pizzicato", "ans": "", "fb": "Zupfen der Saiten statt Streichen mit dem Bogen."}, {"cat": "Glossar", "q": "Rezitativ", "ans": "", "fb": "Sprechähnlicher Gesang, der die Handlung vorantreibt."}, {"cat": "Glossar", "q": "Rubato", "ans": "", "fb": "Ausdrucksvolles, freies Dehnen und Drängen des Tempos."}, {"cat": "Glossar", "q": "Sinfonie", "ans": "", "fb": "Großes mehrsätziges Orchesterwerk, meist in vier Sätzen."}, {"cat": "Glossar", "q": "Stimmfach", "ans": "", "fb": "Kategorie einer Singstimme nach Lage und Klangfarbe."}, {"cat": "Glossar", "q": "Terrassendynamik", "ans": "", "fb": "Lautstärkewechsel in Stufen statt fließend – typisch Barock."}, {"cat": "Glossar", "q": "Timbre", "ans": "", "fb": "Die Klangfarbe einer Stimme oder eines Instruments."}, {"cat": "Glossar", "q": "Tutti", "ans": "", "fb": "Alle spielen zusammen (Gegenteil eines Soloparts)."}, {"cat": "Glossar", "q": "Vibrato", "ans": "", "fb": "Leichtes, regelmäßiges Schwanken der Tonhöhe für Wärme & Ausdruck."}], "sources": [["Gramophone", "gramophone.co.uk – Aufnahmen, Kritiken, Orchester-Rankings (englisch)."], ["The Oxford Dictionary of Music", "Standard-Nachschlagewerk zu Begriffen, Werken und Personen."], ["BR-Klassik", "br-klassik.de – Komponisten, Werke und Hörbeispiele auf Deutsch."], ["Bachtrack", "bachtrack.com – Konzerte, Rezensionen, Orchester-Übersichten."], ["Operabase", "operabase.com – Opern, Aufführungen und Häuser weltweit."]], "articles": {"Epochen & Stil": "<p>Die abendländische Kunstmusik gliedert sich grob in vier große Epochen. Der <b>Barock</b> (ca. 1600–1750) ist kontrapunktisch und verziert, mit gleichmäßigem Puls, Generalbass und Terrassendynamik (Bach, Händel, Vivaldi). Die <b>Wiener Klassik</b> (ca. 1750–1820) bringt Klarheit, Balance und die Sonatensatzform (Haydn, Mozart, Beethoven).</p>\n<p>Die <b>Romantik</b> (ca. 1820–1900) stellt Gefühl, Farbe und Erzählung in den Vordergrund, mit großem Orchester, kühnen Harmonien und Rubato (Brahms, Wagner, Tschaikowsky). Die <b>Moderne</b> (ab ca. 1900) bricht mit den Regeln – Impressionismus, Atonalität, Neoklassik und Minimal Music (Debussy, Strawinsky, Schostakowitsch).</p>", "Orchester & Instrumente": "<p>Das Sinfonieorchester ist nach <b>Klangfamilien</b> geordnet: <b>Streicher</b> (1./2. Violinen, Bratschen, Celli, Kontrabässe), <b>Holzbläser</b> (Flöte, Oboe, Klarinette, Fagott), <b>Blechbläser</b> (Horn, Trompete, Posaune, Tuba) und <b>Schlagwerk</b>, oft ergänzt durch Harfe.</p>\n<p>Die leisen, zahlreichen Streicher sitzen vorn im Halbrund, lautes Blech und Schlagwerk hinten – so bleibt die Balance gewahrt. Der <b>Konzertmeister</b> (erste Geige) stimmt das Orchester ein und ist Bindeglied zum <b>Dirigenten</b>, der Tempo, Balance, Dynamik und die große Linie gestaltet.</p>", "Interpretation & Hören": "<p>Zwei Orchester spielen dieselben Noten und klingen doch völlig verschieden. „Gut\" heißt nicht nur fehlerfrei, sondern <b>überzeugend</b>. Profis und Kritiker achten auf <b>Tempo & Puls</b>, <b>Dynamik & Spannungsbogen</b>, <b>Intonation</b> (Sauberkeit der Tonhöhe), <b>Ensemble</b> (Präzision des Zusammenspiels), <b>Phrasierung</b> und <b>Klangbalance</b>.</p>\n<p>Der schnellste Weg, das Ohr zu schulen, ist der <b>Vergleich</b>: dieselbe Stelle in zwei oder drei Aufnahmen direkt hintereinander hören. So wird hörbar, was eine künstlerische Entscheidung ist – und welche Deutung mehr packt.</p>", "Oper: Die Musik": "<p>In der Oper hören wir die <b>Stimme als Instrument</b>: Sänger werden nach <b>Stimmfächern</b> (Lage und Klangfarbe) eingeteilt – Sopran, Mezzo/Alt, Tenor, Bariton, Bass. Musikalisch zählen Intonation, Phrasierung, Dynamik und das <b>Timbre</b>.</p>\n<p>Das <b>Orchester</b> ist gleichberechtigter Mit-Erzähler: Es trägt Stimmung, Spannung und Farbe. Bei Wagner verknüpfen <b>Leitmotive</b> Klänge mit Personen und Ideen. Begriffe wie <b>Koloratur</b> (virtuose Verzierungen) und <b>Belcanto</b> (schöner Liniengesang) beschreiben Gesangsstile.</p>", "Oper: Grundwissen": "<p>Eine Oper folgt einem Bauplan: die <b>Ouvertüre</b> eröffnet instrumental, das <b>Rezitativ</b> trägt als Sprechgesang die Handlung, die <b>Arie</b> ist die lyrische Solo-Nummer, das <b>Ensemble</b> lässt mehrere Stimmen zugleich erklingen, das <b>Finale</b> bündelt die Fäden eines Akts.</p>\n<p>Der Text einer Oper heißt <b>Libretto</b>. Gute Einstiegswerke sind Mozarts „Zauberflöte\" und Puccinis „La Bohème\" – eingängige Melodien und klare Handlung erleichtern den Zugang.</p>", "Orchester & Dirigenten der Welt": "<p>Zur Weltspitze zählen u. a. das <b>Royal Concertgebouw</b> (Amsterdam), die <b>Berliner</b> und <b>Wiener Philharmoniker</b>, das <b>London Symphony Orchestra</b>, das BR-Symphonieorchester und die US-„Big Five\" (Chicago, Boston, New York, Philadelphia, Cleveland). Die Wiener Philharmoniker verwalten sich selbst und haben bewusst keinen Chefdirigenten.</p>\n<p>Prägende Dirigenten waren etwa <b>Karajan</b>, <b>Bernstein</b> und <b>Carlos Kleiber</b>. Heute leiten u. a. <b>Kirill Petrenko</b> (Berlin), <b>Gustavo Dudamel</b> (New York ab 2026) und <b>Simon Rattle</b> (München); <b>Klaus Mäkelä</b> übernimmt ab 2027 Concertgebouw und Chicago. (Stand 2026.)</p>", "Glossar": "<p>Hier findest du die wichtigsten <b>Fachbegriffe</b> kompakt erklärt – von Arie und Belcanto über Koloratur, Leitmotiv und Rubato bis Tutti und Vibrato. Nutze die Suche oben, um schnell einen Begriff nachzuschlagen.</p>"}};
document.documentElement.style.setProperty('--brand',APP.color);
const m=document.createElement('meta');m.name='theme-color';m.content=APP.color;document.head.appendChild(m);
document.title=APP.title+' – Nachschlagewerk';
document.getElementById('brand').innerHTML=APP.brand;
document.getElementById('logo').textContent=APP.ic;
document.getElementById('foot').textContent=APP.title+' · Nachschlagewerk · '+APP.entries.length+' Einträge';
// tabs
const tabsDef=[['look','Nachschlagen']];
if(APP.aroma)tabsDef.push(['aroma','Aromarad']);
tabsDef.push(['src','Quellen']);
const tabsEl=document.getElementById('tabs');
tabsDef.forEach((t,i)=>{const b=document.createElement('button');b.textContent=t[1];if(i===0)b.classList.add('active');
  b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('v-'+t[0]).classList.add('active');window.scrollTo({top:0});};
  tabsEl.appendChild(b);});
// chips
let activeCat='__all__';
const chipsEl=document.getElementById('chips');
function mkChip(label,val){const b=document.createElement('button');b.className='chip'+(val===activeCat?' active':'');b.textContent=label;
  b.onclick=()=>{activeCat=val;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));b.classList.add('active');render();};return b;}
chipsEl.appendChild(mkChip('Alle','__all__'));
APP.order.forEach(c=>{const ic=APP.icons[c]?APP.icons[c]+' ':'';chipsEl.appendChild(mkChip(ic+c,c));});
// render
const strip=s=>(s||'').replace(/<[^>]+>/g,'');
const searchEl=document.getElementById('search');
function render(){
  const q=searchEl.value.trim().toLowerCase();
  const cats=activeCat==='__all__'?APP.order:[activeCat];
  const list=document.getElementById('list');list.innerHTML='';
  let total=0;
  cats.forEach(cat=>{
    let items=APP.entries.filter(e=>e.cat===cat);
    if(q)items=items.filter(e=>(e.q+' '+strip(e.ans)+' '+strip(e.fb)).toLowerCase().includes(q));
    if(!items.length)return;
    total+=items.length;
    const block=document.createElement('div');block.className='catblock';
    const ic=APP.icons[cat]?'<span class="ic">'+APP.icons[cat]+'</span>':'';
    const art=(APP.articles&&APP.articles[cat])?'<div class="article">'+APP.articles[cat]+'</div>':'';
    block.innerHTML='<h2>'+ic+cat+'</h2>'+art+(items.length?'<div class="factlabel">Fakten &amp; Details</div>':'')+items.map(e=>{
      let s='<div class="entry"><div class="q">'+e.q+'</div>';
      if(e.ans)s+='<div class="ans"><span class="lab">Antwort:</span> '+e.ans+'</div>';
      if(e.fb)s+='<div class="fb">'+e.fb+'</div>';
      return s+'</div>';
    }).join('');
    list.appendChild(block);
  });
  document.getElementById('count').textContent=total+' Einträge'+(q?' für „'+searchEl.value+'"':'')+(activeCat!=='__all__'?' in '+activeCat:'');
  if(!total)list.innerHTML='<div class="empty">Nichts gefunden.</div>';
}
searchEl.addEventListener('input',render);
// sources
document.getElementById('srclist').innerHTML=APP.sources.map(s=>'<div class="src"><b>'+s[0]+'</b><p>'+s[1]+'</p></div>').join('');
render();
</script>
